name: Java UT

on:
  workflow_dispatch:
  pull_request:
    types: [ opened, reopened, synchronize ]
    paths:
      - '**/*'
  push:
    branches:
      - 'main'
    paths:
      - '**/*'

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  ut-java:
    strategy:
      matrix:
        include:
          - name: ubuntu24
            image: ubuntu:24.04
            setup_script: .github/workflows/scripts/common/setup-ubuntu24.sh
          - name: al2023
            image: amazonlinux:latest
            setup_script: .github/workflows/scripts/common/setup-al2023.sh
          - name: centos7
            image: centos:7
            setup_script: .github/workflows/scripts/common/setup-centos7.sh
    runs-on: ubuntu-latest
    env:
      CACHE_DIR: .ccache
      CCACHE_MAXSIZE: 3000M
    steps:
      - uses: actions/checkout@v4
      - name: Restore Ccache
        uses: actions/cache/restore@v4
        with:
          path: '${{ github.workspace }}/${{ env.CACHE_DIR }}'
          key: ut-java-${{ matrix.name }}-${{ runner.arch }}-ccache-${{github.sha}}
          restore-keys: |
            ut-java-${{ matrix.name }}-${{ runner.arch }}-ccache-
      - name: Start Docker container
        run: |
          docker run --init -d --name test-container \
            -e CCACHE_DIR=/velox4j/${{ env.CACHE_DIR }} \
            -e CCACHE_MAXSIZE=${{ env.CCACHE_MAXSIZE }} \
            -v ${{ github.workspace }}:/velox4j \
            -w /velox4j \
            ${{ matrix.image }} sleep infinity
      - name: Run setup script
        run: |
          docker exec test-container bash -c "
            bash ${{ matrix.setup_script }}
          "
      - name: Build C++ libraries
        run: |
          docker exec test-container bash -c "
            mvn clean generate-resources
          "
      - name: Show disk usage (debug)
        run:
          df -h
      - name: Run UTs
        run: |
          docker exec test-container bash -c "
            mvn clean test -Dskip.cpp.build
          "
      - name: Run UTs with Arrow 7.0.0
        run: |
          docker exec test-container bash -c "
            mvn clean test -Dskip.cpp.build -Darrow.version=7.0.0
          "
      - name: Stop Docker container
        if: always()
        run: |
          docker stop test-container
      - name: Save Ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: '${{ github.workspace }}/${{ env.CACHE_DIR }}'
          key: ut-java-${{ matrix.name }}-${{ runner.arch }}-ccache-${{github.sha}}
